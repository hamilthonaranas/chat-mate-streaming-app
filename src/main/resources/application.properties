# ChattMate Spring Boot Application Configuration

## Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/chattmate_db
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

## JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

## Server Configuration
server.port=8080
server.servlet.context-path=/

## Application Name
spring.application.name=chattmate-api

## Logging
logging.level.root=INFO
logging.level.com.chattmate=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

## LiveKit Configuration
livekit.api.key=${LIVEKIT_API_KEY}
livekit.api.secret=${LIVEKIT_API_SECRET}
livekit.url=${LIVEKIT_URL}

## JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

## File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

## Async Configuration
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10

## Actuator Configuration (monitoring)
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=when-authorized
